<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <title>Contact Us - University of Agriculture Faisalabad</title>
</head>
<body>
  <div class="navbar">
    <img src="./ChatGPT Image Oct 1, 2025, 10_03_37 AM.png" class="logo" alt="University Logo">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="program.html">Programs</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="search-bar">
      <button>Explore More</button>
    </div>
  </div>

  <!-- <header style="background-color: #6c4040; padding: 1.5rem 2rem; text-align:center;">
    <h1 style="color:#fff; font-family: 'Cinzel', serif; margin:0; font-size: 2.5rem;">Contact Us</h1>
  </header> -->

  <main style="max-width: 900px; margin: 3rem auto; padding: 0 1.5rem;">
    <section style="margin-bottom: 3rem;">
      <h2 style="font-family: 'Cinzel', serif; font-size: 2rem; color: #6c4040; margin-bottom: 1.5rem;">Get in Touch</h2>

      <form style="display: flex; flex-direction: column; gap: 1.2rem;">
        <input type="text" name="name" placeholder="Your Name" required
          style="padding: 0.8rem; font-size: 1rem; border: 2px solid #6c4040; border-radius: 8px; outline:none;"/>
        <input type="email" name="email" placeholder="Your Email" required
          style="padding: 0.8rem; font-size: 1rem; border: 2px solid #6c4040; border-radius: 8px; outline:none;"/>
        <input type="text" name="subject" placeholder="Subject"
          style="padding: 0.8rem; font-size: 1rem; border: 2px solid #6c4040; border-radius: 8px; outline:none;"/>
        <textarea name="message" placeholder="Your Message" rows="6" required
          style="padding: 0.8rem; font-size: 1rem; border: 2px solid #6c4040; border-radius: 8px; outline:none;"></textarea>
        <button type="submit"
          style="background-color: #6c4040; color: #fff; font-family: 'Cinzel', serif; font-size: 1.2rem; padding: 0.75rem;
          border: none; border-radius: 8px; cursor: pointer; transition: background-color 0.3s ease;">Send Message</button>
      </form>
    </section>

    <section>
      <h2 style="font-family: 'Cinzel', serif; font-size: 2rem; color: #6c4040; margin-bottom: 1rem;">Contact Information</h2>
      <p style="line-height: 1.6; font-size: 1.1rem;">
        <strong>Address:</strong> Agriculture University Road, Faisalabad, Pakistan<br/>
        <strong>Phone:</strong> +92 41 9200156<br/>
        <strong>Email:</strong> <a href="mailto:info@uaf.edu.pk" style="color: #6c4040; text-decoration:none;">info@uaf.edu.pk</a>
      </p>
    </section>
  </main>
</body>
</html>
